name: Pylint

on:
  push:
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: |
          requirements.txt
          pyproject.toml

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pylint
        if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

    - name: Pylint (blocking: errors only)
      run: |
        python -m pylint --rcfile=.pylintrc --disable=all --enable=E,F ebus_core thelia main_service.py

    - name: Pylint (advisory report)
      run: |
        python -m pylint --rcfile=.pylintrc ebus_core thelia main_service.py || true
